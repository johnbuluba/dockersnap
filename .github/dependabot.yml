version: 2
updates:
  # Go modules — daemon, plugins, SDK, all share one go.mod.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows under .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions

  # Dashboard npm dependencies.
  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - dashboard
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
