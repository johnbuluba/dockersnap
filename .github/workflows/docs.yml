name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "CONTRIBUTING.md"
      - "AGENTS.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install --upgrade mkdocs-material

      - name: Stage repo-root docs into the docs/ tree
        # MkDocs only sees files under docs/ (or symlinks resolved from there).
        # We mirror CONTRIBUTING.md and AGENTS.md into docs/ at build time so
        # the source files keep their canonical location at the repo root
        # (where GitHub picks them up automatically).
        run: |
          cp CONTRIBUTING.md docs/contributing.md
          cp AGENTS.md docs/agents.md

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
