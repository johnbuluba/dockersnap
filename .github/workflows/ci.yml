name: ci

# CI is intentionally thin: every step calls a `task <target>` from
# Taskfile.yml so local dev and CI run the exact same command. If a check
# needs tweaking, change Taskfile.yml — not this workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (build, vet, test, lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task vet
      - run: task go:build
      - run: task test:race

      # Lint is disabled in CI for now — the codebase has pre-existing
      # findings (errcheck, staticcheck) that need a dedicated cleanup
      # pass. Run `task lint:install && task lint` locally if you want
      # to see them. Re-enable here once the backlog is cleared.
      # - run: task lint:install
      # - run: task lint

      - run: task vulncheck

  ui:
    name: Dashboard (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task ui:install
      - run: task ui:typecheck
      - run: task ui:build

  docs:
    name: Docs (mkdocs build --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - run: pip install --upgrade mkdocs-material

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task docs:build
