name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (build, vet, test, lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  ui:
    name: Dashboard (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Type-check
        working-directory: dashboard
        run: npm run typecheck

      - name: Build
        working-directory: dashboard
        run: npm run build

  docs:
    name: Docs (mkdocs build --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install --upgrade mkdocs-material

      - name: Stage repo-root docs into docs/
        run: |
          cp CONTRIBUTING.md docs/contributing.md
          cp AGENTS.md docs/agents.md

      - name: Build (--strict catches broken nav and dead links)
        run: mkdocs build --strict
