name: Feature request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new capability or a UX improvement? Tell us about
        it. The more concrete the use case, the better.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the situation that this feature would help with. Don't
        jump straight to the solution — start with what you're trying to
        do, what's painful about doing it today, and who else might hit
        the same thing.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: |
        Sketch what you'd like the feature to look like. CLI verb,
        flag, API endpoint, dashboard view — whatever's most natural.
        Not committing you to anything; this is a starting point.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other tools, flags, or workflows you've used to work around this.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Links, screenshots, prior art, related issues.
    validations:
      required: false
