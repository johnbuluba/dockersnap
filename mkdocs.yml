site_name: dockersnap
site_description: Instant snapshot, revert, and clone of Docker-based dev environments via ZFS
site_url: https://johnbuluba.github.io/dockersnap/
repo_url: https://github.com/johnbuluba/dockersnap
repo_name: johnbuluba/dockersnap
edit_uri: edit/main/docs/

theme:
  name: material
  # Disable Google Fonts loading. Geist + JetBrains Mono are self-hosted via
  # docs/stylesheets/extra.css using files under docs/assets/fonts/. See
  # docs/DASHBOARD-DESIGN.md §3b for the rationale.
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    # Dark scheme (operator-default, per the dashboard's design doc).
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: getting-started.md
    - CLI Reference: cli.md
    - Troubleshooting: troubleshooting.md
  - Plugins:
    - Authoring a plugin: plugins/authoring.md
    - Plugin contract (reference): PLUGIN-DESIGN.md
  - Internals:
    - Architecture: DESIGN.md
    - Snapshot internals: SNAPSHOT-INTERNALS.md
    - Dashboard: DASHBOARD-DESIGN.md
    - MCP server (parked): MCP-DESIGN.md
  - Contributing:
    - Contributor guide: contributing.md
    - Conventions: agents.md
